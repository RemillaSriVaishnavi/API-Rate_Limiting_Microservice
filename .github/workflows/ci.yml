name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:4.4
        ports:
          - 27017:27017

      redis:
        image: redis:6
        ports:
          - 6379:6379

    env:
      DATABASE_URL: mongodb://localhost:27017/ratelimitdb
      REDIS_URL: redis://localhost:6379
      PORT: 3000
      DEFAULT_RATE_LIMIT_MAX_REQUESTS: 10
      DEFAULT_RATE_LIMIT_WINDOW_SECONDS: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Wait for MongoDB
        run: |
          for i in {1..10}; do
            nc -z localhost 27017 && echo "Mongo ready" && exit 0
            echo "Waiting for Mongo..."
            sleep 2
          done
          exit 1

      - name: Run Tests
        run: npm test