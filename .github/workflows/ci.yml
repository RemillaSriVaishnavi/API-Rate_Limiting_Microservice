name: CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3


    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18


    - name: Install Dependencies
      run: npm install


    - name: Run Unit Tests
      run: npm test


    - name: Build Docker Image
      run: docker build -t my-ratelimit-service .


    - name: Start Services
      run: docker-compose up -d


    - name: Wait for services
      run: sleep 15


    - name: Run Integration Tests
      run: npm test


    - name: Stop Services
      run: docker-compose down